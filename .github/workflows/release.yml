name: Release APK

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    # Production env for the raw prebuild + Gradle build (this pipeline does NOT
    # use `eas build`, so eas.json env never applies). EXPO_PUBLIC_APP_ENV flips
    # android.usesCleartextTraffic=false at prebuild (app.config.js); the
    # EXPO_PUBLIC_* values are inlined into the JS bundle during assembleRelease.
    # GSAV_WEB_URL / SENTRY_DSN come from repo secrets (empty until configured —
    # an empty GSAV URL falls back to the dev default with a loud warn).
    env:
      EXPO_PUBLIC_APP_ENV: production
      EXPO_PUBLIC_GSAV_WEB_URL: ${{ secrets.GSAV_WEB_URL }}
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Advisory until the production GSAV origin is configured (P2-4). Currently
      # exits non-zero because EXPO_PUBLIC_GSAV_WEB_URL is unset — do NOT make this
      # required (continue-on-error) or it would block every release today.
      - name: Verify native production config (advisory)
        continue-on-error: true
        run: npm run verify:native-production-config

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(node scripts/bump-version.js)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build Release APK
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "JKVideo v${{ steps.bump.outputs.version }}" \
            --generate-notes \
            android/app/build/outputs/apk/release/app-release.apk
